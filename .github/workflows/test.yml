# loop-eng CI — the project's own philosophy applied to itself: "done" for a
# push must be a machine-verified fact, not a human remembering to run the
# suite. (Audit H3: releases previously relied entirely on a manual
# `bash tests/run-all.sh`.)
#
# Matrix notes:
# - ubuntu: shellcheck via apt; bash 5.x system-wide.
# - macos: stock /bin/bash is 3.2 — too old for the unattended drivers
#   (bash >= 4.4: empty-array expansion under set -u), so install brew bash
#   (lands first on PATH) + shellcheck. This makes the "hooks work on macOS,
#   unattended needs modern bash" claim a TESTED fact on 5.x.
# - test-bash32: a SEPARATE macOS job that does NOT install brew bash and runs
#   the five hooks-only suites through the stock /bin/bash (3.2) EXPLICITLY, so
#   the "hooks are bash-3.2 compatible" claim is machine-verified, not asserted.
#   It deliberately excludes the test-unattended-* suites (their drivers require
#   bash >= 4.4) and invokes /bin/bash by absolute path so it can never fall
#   through to a 5.x bash that happens to be on PATH.
name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q shellcheck

      - name: Install modern bash + shellcheck + coreutils (macOS)
        if: runner.os == 'macOS'
        # coreutils provides gtimeout, so the stop-gate's fail-closed timeout
        # path is exercised on macOS instead of SKIPped.
        run: brew install bash shellcheck coreutils

      - name: Show tool versions
        run: |
          bash --version | head -1
          shellcheck --version | grep version: || true

      - name: Run test suite
        run: bash tests/run-all.sh

  # Stock macOS bash is 3.2. This job proves the hooks + their scripts run there
  # by invoking the five hooks-only suites through /bin/bash directly. NO brew
  # bash here — that is the whole point. The unattended suites are excluded
  # because their drivers require bash >= 4.4.
  test-bash32:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prove /bin/bash is stock 3.2
        run: /bin/bash --version | head -1

      - name: Run hooks-only suites under stock /bin/bash (3.2)
        run: |
          set -e
          for t in tests/test-arm-contract.sh \
                   tests/test-evidence-gate.sh \
                   tests/test-run-contract.sh \
                   tests/test-stop-gate.sh \
                   tests/test-hooks-json.sh; do
            echo "=== /bin/bash $t ==="
            /bin/bash "$t"
          done

      - name: Syntax-check the hooks-only scripts under /bin/bash (3.2)
        run: |
          set -e
          for f in tests/lib.sh \
                   hooks/stop-gate.sh \
                   hooks/evidence-gate.sh \
                   skills/loop-eng/scripts/run-contract.sh \
                   skills/loop-eng/scripts/arm-contract.sh; do
            /bin/bash -n "$f"
          done
